name: "Investigación y alcance"
description: "Fuentes oficiales, alcance de preguntas, supuestos y exclusiones."
title: "M1-1: "
labels: ["type:research"]
body:
  - type: markdown
    attributes:
      value: |
        Define el alcance del asistente y documenta fuentes públicas para Fundación Valle del Lili (FVL).
  - type: input
    id: owner
    attributes:
      label: Responsable (branch)
      placeholder: "Nicolas / Jhonatan / Mateo / Jorge"
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Fuentes a cubrir (URLs)
      description: "Lista de URLs oficiales / secciones del sitio / redes (si aplica)."
      placeholder: |
        - https://...
        - https://...
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Alcance (qué sí / qué no)
      placeholder: |
        Sí: servicios, especialidades, sedes, contacto, procesos básicos.
        No: diagnósticos, recomendaciones médicas, datos de pacientes, citas.
    validations:
      required: true
  - type: textarea
    id: dod
    attributes:
      label: Definition of Done (DoD)
      value: |
        - [ ] Actualiza `docs/fuentes.md`
        - [ ] Actualiza `docs/alcance.md`
        - [ ] Propone banco inicial de preguntas en `tests/qa_questions.md`
    validations:
      required: true

