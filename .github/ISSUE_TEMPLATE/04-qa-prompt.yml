name: "Q&A (NO-RAG) + Prompt"
description: "Prompt engineering, guardrails y motor Q&A sin vector DB."
title: "M1-4: "
labels: ["type:prompt"]
body:
  - type: input
    id: owner
    attributes:
      label: Responsable (branch)
      placeholder: "Nicolas / Jhonatan / Mateo / Jorge"
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Alcance del Q&A
      placeholder: |
        - Responder solo con contexto
        - Cuando no haya info: "No tengo información..."
        - Estilo y formato
    validations:
      required: true
  - type: textarea
    id: dod
    attributes:
      label: Definition of Done (DoD)
      value: |
        - [ ] Prompt actualizado en `app/engine.py` (o archivo de prompt en `docs/`)
        - [ ] La app responde sin alucinaciones ante preguntas fuera de contexto
        - [ ] Evidencia de 5 ejemplos en `docs/resultados_ejemplos.md`
    validations:
      required: true

