name: "Documentación / informe"
description: "Informe final, evidencias, resultados y limitaciones."
title: "M1-5: "
labels: ["type:docs"]
body:
  - type: input
    id: owner
    attributes:
      label: Responsable (branch)
      placeholder: "Nicolas / Jhonatan / Mateo / Jorge"
    validations:
      required: true
  - type: textarea
    id: sections
    attributes:
      label: Secciones a completar
      placeholder: |
        - Descripción del problema
        - Planteamiento de la solución
        - Preparación de datos
        - Modelado
        - Resultados + limitaciones
    validations:
      required: true
  - type: textarea
    id: dod
    attributes:
      label: Definition of Done (DoD)
      value: |
        - [ ] `docs/informe.md` completo según el enunciado
        - [ ] `tests/qa_results.csv` con 20 preguntas y análisis corto
    validations:
      required: true

